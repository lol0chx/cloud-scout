# fly.toml app configuration file generated for cloudscout-api on 2026-05-16T21:39:46-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cloudscout-api'
# sjc (San Jose) is the closest robust Fly region to Supabase's
# aws-1-us-west-2 — keeps DB round-trips in-region instead of crossing
# the country (iad). Big latency win for the data-heavy endpoints.
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero: with min_machines_running = 0, Fly stops all machines
  # when the app is idle (≈ $0 while no one is using it) and auto-starts
  # one on the next incoming request. Trade-off: a ~1-3s cold start on
  # the first request after idle.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 60
    soft_limit = 30

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
