# fly.toml app configuration file generated for cloudscout-api on 2026-05-16T21:39:46-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cloudscout-api'
# sjc (San Jose) is the closest robust Fly region to Supabase's
# aws-1-us-west-2 — keeps DB round-trips in-region instead of crossing
# the country (iad). Big latency win for the data-heavy endpoints.
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm 24/7. Scale-to-zero (min=0) caused a ~10s cold
  # start + intermittent 500s on every tab change during real use — not
  # acceptable for a released app. ~$5-8/mo for an always-responsive app
  # is the right trade. The 2nd machine still auto-stops when idle.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 60
    soft_limit = 30

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
