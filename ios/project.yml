name: CloudScout
options:
  bundleIdPrefix: com.cloudscout
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CloudScout:
    type: application
    platform: iOS
    sources:
      - path: CloudScout
    info:
      path: CloudScout/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
